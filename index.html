<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan OSIS</title>
    <link rel="icon" type="image/jpeg" href="https://cdn.yupra.my.id/yp/dc9y33vh.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.7)), url('https://cdn.yupra.my.id/yp/dc9y33vh.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px;
        }

        .container { width: 100%; max-width: 500px; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); color: white; margin-bottom: 20px;
        }

        h2 { text-align: center; margin-bottom: 15px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 20px; }

        /* TABS GESER */
        .tabs-wrapper {
            overflow-x: auto; display: flex; gap: 10px; padding-bottom: 10px; margin-bottom: 10px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tab-item {
            flex: 0 0 auto; padding: 10px 18px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px; color: white; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .tab-item.active { background: #25D366; border-color: #25D366; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4); }

        #status-loading { font-size: 11px; color: #ff9f43; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; }

        /* CARD SISWA */
        .card-siswa {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-hapus { background: transparent; color: #ff4757; border: 1px solid #ff4757; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; }

        /* INPUT DAN CUSTOM DROPDOWN */
        .search-wrapper { position: relative; width: 100%; }
        input[type="text"], textarea {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: rgba(255, 255, 255, 0.95); color: #333; font-size: 14px; outline: none;
        }
        
        .dropdown-list {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff; color: #333;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); max-height: 180px; overflow-y: auto;
            z-index: 999; display: none; text-align: left; margin-top: 5px; border: 1px solid #ddd;
        }
        .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 500; }
        .dropdown-item:active { background: #f1f1f1; color: #25D366; }

        /* CHIPS */
        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .chip {
            padding: 7px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; color: white; cursor: pointer; font-size: 11px; transition: 0.2s;
        }
        .chip.active { background: #ff9f43; border-color: #ff9f43; color: #fff; font-weight: 600; }

        .input-lainnya { display: none; width: 100%; margin-top: 10px; padding: 10px; font-size: 12px; }

        .btn-tambah {
            width: 100%; padding: 12px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 10px;
            background: transparent; color: white; font-weight: 600; font-size: 14px; cursor: pointer; margin-bottom: 20px;
        }
        .btn-primary {
            width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; font-weight: 600; font-size: 15px; cursor: pointer;
        }

        #halaman-hasil { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-effect" id="halaman-input">
            <h2>📝 Generator Laporan</h2>
            
            <div class="tabs-wrapper" id="tabs-kelas"></div>
            <div id="status-loading">⏳ Menarik absen...</div>

            <div id="pelanggar-container"></div>

            <button class="btn-tambah" onclick="tambahKotak()">➕ Tambah Siswa</button>
            <button class="btn-primary" onclick="generateTeks()">🚀 Buat Teks Laporan</button>
        </div>

        <div class="glass-effect" id="halaman-hasil">
            <h2>📋 Teks Siap Salin</h2>
            <textarea id="teks-hasil" rows="15" style="margin-bottom: 15px;"></textarea>
            <button class="btn-primary" onclick="salinTeks()" id="btn-copy">📋 Salin Teks</button>
            <button class="btn-primary" style="background: rgba(255,255,255,0.2); margin-top:10px;" onclick="kembaliEdit()">⬅️ Kembali</button>
        </div>
    </div>

    <script>
        // ⚠️ ID SPREADSHEET (Sudah dikembalikan ke settingan awal kamu)
        const ID_SPREADSHEET_ABSEN = "12flkTGNFV6wjHRHCfSXS4FlLr6FpME5YKsJCH_pUMP8"; 
        
        const kelasList = ["10 TKR", "10 TKJ", "10 MP", "11 TKR", "11 TKJ", "11 MP", "12 TKR", "12 TKJ", "12 MP"];
        const pelanggaranList = ["Topi", "Dasi", "Badge", "Kaos Kaki", "Terlambat", "Lainnya"];

        let activeTab = "10 TKR";
        let dbSiswa = []; 
        let listSiswaServer = []; 

        window.onload = () => {
            renderTabs();
            switchTab("10 TKR");
        };

        function renderTabs() {
            const container = document.getElementById('tabs-kelas');
            container.innerHTML = "";
            kelasList.forEach(k => {
                const div = document.createElement('div');
                div.className = `tab-item ${k === activeTab ? 'active' : ''}`;
                div.textContent = k;
                div.onclick = () => switchTab(k);
                container.appendChild(div);
            });
        }

        // --- SISTEM TARIK DATA 100% PERSIS WEB 1 ---
        async function switchTab(kelas) {
            simpanKeMemori();
            activeTab = kelas;
            dbSiswa = []; // Bersihkan kotak input kalau pindah kelas
            listSiswaServer = []; // Kosongkan daftar absen lama
            renderTabs();
            
            const status = document.getElementById('status-loading');
            status.style.display = 'block';
            status.innerText = "⏳ Sedang memuat absen " + kelas + "...";
            status.style.color = "#ff9f43";
            document.getElementById('pelanggar-container').innerHTML = ""; // Hapus kotak saat loading

            let parts = kelas.split(' ');
            let kls = parts[0];
            let jur = parts[1] === "TKR" ? "TKRO" : parts[1];
            
            const sheetName = `${kls} ${jur}`; 
            const targetRange = (kls === "12") ? "B7:B" : "D2:D";
            const csvUrl = `https://docs.google.com/spreadsheets/d/${ID_SPREADSHEET_ABSEN}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=${targetRange}&cache=${new Date().getTime()}`;

            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error("Gagal mengambil data");
                const text = await res.text();
                
                let rawNames = text.split('\n').map(row => row.replace(/"/g, '').trim());
                listSiswaServer = rawNames.filter(n => n !== "" && !n.toLowerCase().includes("nama"));
                
                status.innerText = `✅ Data ${kelas} Siap!`;
                status.style.color = "#25D366";
                setTimeout(() => { status.style.display = 'none'; }, 2000);

                // Baru munculkan kotak siswa SETELAH data absen berhasil ditarik
                tambahKotak(); 

            } catch (e) {
                status.innerText = "❌ Gagal memuat absen. Periksa internet Anda.";
                status.style.color = "#ff4757";
                tambahKotak(); // Tetap munculin kotak walau gagal (biar bisa ketik manual)
            }
        }

        function tambahKotak() {
            simpanKeMemori();
            dbSiswa.push({ nama: "", chips: [], lainnya: "" });
            renderKotak();
        }

        function hapusKotak(index) {
            simpanKeMemori();
            dbSiswa.splice(index, 1);
            renderKotak();
        }

        function simpanKeMemori() {
            const cards = document.querySelectorAll('.card-siswa');
            cards.forEach((card, i) => {
                if(dbSiswa[i]) {
                    dbSiswa[i].nama = card.querySelector('.input-nama').value;
                    let inputL = card.querySelector('.input-lainnya');
                    if(inputL) dbSiswa[i].lainnya = inputL.value;
                }
            });
        }

        function renderKotak() {
            const container = document.getElementById('pelanggar-container');
            container.innerHTML = "";
            
            // Susun HTML untuk isi dropdown dari listSiswaServer yang baru ditarik
            let dropdownHtml = "";
            listSiswaServer.forEach(nama => {
                // Gunakan escape character biar aman dari nama yang ada tanda kutipnya
                const safeNama = nama.replace(/'/g, "\\'");
                // Gunakan onmousedown karena dia dieksekusi lebih dulu daripada onblur di input
                dropdownHtml += `<div class="dropdown-item" onmousedown="pilihNama(${dbSiswa.length}, '${safeNama}', event)">${nama}</div>`;
            });

            dbSiswa.forEach((data, i) => {
                let chipsHtml = "";
                pelanggaranList.forEach(p => {
                    const active = data.chips.includes(p) ? "active" : "";
                    chipsHtml += `<div class="chip ${active}" onclick="toggleChip(${i}, '${p}')">${p}</div>`;
                });

                // Perbaiki onclick parameter nama menggunakan template strings yang aman
                let itemHtmlPerKotak = "";
                listSiswaServer.forEach(nama => {
                    const safeNama = nama.replace(/'/g, "\\'");
                    itemHtmlPerKotak += `<div class="dropdown-item" onmousedown="pilihNama(${i}, '${safeNama}')">${nama}</div>`;
                });

                container.innerHTML += `
                    <div class="card-siswa">
                        <div class="card-header">
                            <span style="font-size:12px; font-weight:bold; color:#25D366;">#${i + 1} Pelanggar</span>
                            ${i > 0 ? `<button class="btn-hapus" onclick="hapusKotak(${i})">Hapus</button>` : ''}
                        </div>
                        
                        <div class="search-wrapper">
                            <input type="text" id="input-nama-${i}" class="input-nama" placeholder="Cari Nama Siswa..." 
                                autocomplete="new-password" 
                                value="${data.nama}"
                                onfocus="bukaDropdown(${i})" 
                                onkeyup="filterDropdown(${i})"
                                onblur="tutupDropdown(${i})">
                            <div class="dropdown-list" id="dropdown-${i}">
                                ${itemHtmlPerKotak}
                            </div>
                        </div>

                        <div class="chip-group">${chipsHtml}</div>
                        <input type="text" class="input-lainnya" placeholder="Ketik pelanggaran lainnya..." style="display:${data.chips.includes('Lainnya')?'block':'none'}" value="${data.lainnya}">
                    </div>
                `;
            });
        }

        // --- SISTEM DROPDOWN CERDAS ---
        function bukaDropdown(index) {
            // Sembunyikan semua dropdown lain dulu
            document.querySelectorAll('.dropdown-list').forEach(d => d.style.display = 'none');
            
            const drop = document.getElementById(`dropdown-${index}`);
            // Cek kalau ada isinya, baru munculin (biar kotak putih kosong ga nongol)
            if (drop && drop.children.length > 0) {
                drop.style.display = 'block';
            }
        }

        function tutupDropdown(index) {
            // Beri sedikit delay agar event 'onmousedown' di item dropdown sempat berjalan
            setTimeout(() => {
                const drop = document.getElementById(`dropdown-${index}`);
                if (drop) drop.style.display = 'none';
            }, 150);
        }

        function filterDropdown(index) {
            const input = document.getElementById(`input-nama-${index}`);
            const filter = input.value.toLowerCase();
            dbSiswa[index].nama = input.value; // Simpan ketikan ke memori

            const drop = document.getElementById(`dropdown-${index}`);
            const items = drop.getElementsByClassName('dropdown-item');
            let adaYangCocok = false;
            
            for (let i = 0; i < items.length; i++) {
                let txt = items[i].innerText.toLowerCase();
                if (txt.indexOf(filter) > -1) {
                    items[i].style.display = "block";
                    adaYangCocok = true;
                } else {
                    items[i].style.display = "none";
                }
            }
            drop.style.display = adaYangCocok ? "block" : "none";
        }

        function pilihNama(index, nama) {
            const input = document.getElementById(`input-nama-${index}`);
            input.value = nama;
            dbSiswa[index].nama = nama; // Masukkan ke database lokal web
            document.getElementById(`dropdown-${index}`).style.display = 'none';
        }

        // --- SISTEM CHIPS & GENERATE TEKS ---
        function toggleChip(index, p) {
            simpanKeMemori();
            let arr = dbSiswa[index].chips;
            let i = arr.indexOf(p);
            if(i > -1) arr.splice(i, 1);
            else arr.push(p);
            renderKotak();
        }

        function generateTeks() {
            simpanKeMemori();
            let finalTeks = "";
            let count = 0;

            dbSiswa.forEach(row => {
                if (row.nama && row.chips.length > 0) {
                    let list = [...row.chips];
                    if(list.includes("Lainnya")) {
                        list = list.filter(p => p !== "Lainnya");
                        if(row.lainnya && row.lainnya.trim() !== "") {
                            list.push(row.lainnya.trim());
                        }
                    }
                    finalTeks += `${row.nama} ${activeTab.toLowerCase()}: ${list.join(', ')}\n`;
                    count++;
                }
            });

            if(count === 0) return alert("Pilih minimal 1 nama dan pelanggarannya!");
            document.getElementById('teks-hasil').value = finalTeks;
            document.getElementById('halaman-input').style.display = "none";
            document.getElementById('halaman-hasil').style.display = "block";
        }

        function kembaliEdit() {
            document.getElementById('halaman-input').style.display = "block";
            document.getElementById('halaman-hasil').style.display = "none";
            document.getElementById('btn-copy').innerText = "📋 Salin Teks";
        }

        function salinTeks() {
            const t = document.getElementById('teks-hasil');
            t.select(); document.execCommand('copy');
            document.getElementById('btn-copy').innerText = "✅ Tersalin!";
        }
    </script>
</body>
</html>
