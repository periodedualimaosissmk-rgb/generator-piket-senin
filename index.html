<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan Senin (Online)</title>
    <link rel="icon" type="image/jpeg" href="https://cdn.yupra.my.id/yp/dc9y33vh.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.7)), url('https://cdn.yupra.my.id/yp/dc9y33vh.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px;
        }

        .container { width: 100%; max-width: 500px; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); color: white; margin-bottom: 20px;
        }

        h2 { text-align: center; margin-bottom: 5px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 20px; }
        .subtitle { text-align: center; font-size: 11px; color: #ddd; margin-bottom: 15px; }

        input[type="text"], select, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 10px;
            background: rgba(255, 255, 255, 0.95); color: #333; font-size: 14px; outline: none; font-family: 'Poppins', sans-serif;
        }

        .flex-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .flex-row select { margin-bottom: 0; }

        #status-loading { font-size: 11px; color: #ff9f43; text-align: center; margin-bottom: 10px; font-weight: bold; display: none; }

        /* CARD SISWA */
        .card-siswa {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: bold; color: #25D366; }
        .btn-hapus { background: transparent; color: #ff4757; border: 1px solid #ff4757; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; }

        /* CHIPS */
        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .chip {
            padding: 6px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; color: white; cursor: pointer; font-size: 11px; transition: 0.2s; user-select: none;
        }
        .chip.active { background: #ff9f43; border-color: #ff9f43; color: #fff; font-weight: 600; }

        .input-lainnya { display: none; width: 100%; margin-top: 10px; padding: 8px; font-size: 12px; }

        /* BUTTONS */
        .btn-tambah {
            width: 100%; padding: 12px; border: 2px dashed rgba(255,255,255,0.4); border-radius: 10px;
            background: transparent; color: white; font-weight: 600; font-size: 14px; cursor: pointer; margin-bottom: 15px; transition: 0.3s;
        }
        .btn-tambah:hover { border-color: #25D366; color: #25D366; background: rgba(37, 211, 102, 0.1); }
        
        .btn-primary {
            width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; font-weight: 600; font-size: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        #halaman-hasil { display: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="glass-effect" id="halaman-input">
            <h2>🚩 Laporan Senin (Online)</h2>
            <p class="subtitle">Data diambil langsung dari server</p>

            <input type="text" id="input-petugas" placeholder="Nama Petugas (Wajib)">

            <div class="flex-row">
                <select id="select-kelas" onchange="loadSiswaLive()">
                    <option value="" disabled selected>Pilih Kelas</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
                <select id="select-jurusan" onchange="loadSiswaLive()">
                    <option value="" disabled selected>Pilih Jurusan</option>
                    <option value="TKR">TKR</option>
                    <option value="TKJ">TKJ</option>
                    <option value="MP">MP</option>
                </select>
            </div>
            
            <div id="status-loading">⏳ Menarik data absen...</div>

            <datalist id="datalist-nama"></datalist>

            <div id="list-pelanggar"></div>

            <button class="btn-tambah" onclick="tambahKotak()">➕ Tambah Pelanggar</button>
            <button class="btn-primary" onclick="generateLaporan()">🚀 Buat Teks Laporan</button>
        </div>

        <div class="glass-effect" id="halaman-hasil">
            <h2>📋 Hasil Laporan</h2>
            <p style="font-size: 12px; color: #ddd; margin-bottom: 15px; text-align: center;">Salin teks ini dan kirim ke Bot WA.</p>
            <textarea id="teks-hasil" rows="15"></textarea>
            <button class="btn-primary" onclick="salinTeks()" id="btn-copy">📋 Salin Teks</button>
            <button class="btn-primary" style="background: rgba(255,255,255,0.2); margin-top:10px; box-shadow: none;" onclick="kembaliEdit()">⬅️ Kembali Edit Form</button>
        </div>

    </div>

    <script>
        // ⚠️ ID SPREADSHEET ABSENSI
        const ID_SPREADSHEET_ABSEN = "12flkTGNFV6wjHRHCfSXS4FlLr6FpME5YKsJCH_pUMP8"; 
        const pelanggaranList = ["Topi", "Dasi", "Badge", "Kaos Kaki", "Terlambat", "Lainnya"];
        
        let dataSiswa = []; 

        window.onload = () => {
            tambahKotak(); // Munculkan 1 kotak di awal
        };

        // --- SISTEM TARIK DATA LIVE (ONLINE) ---
        async function loadSiswaLive() {
            const kls = document.getElementById('select-kelas').value;
            let jur = document.getElementById('select-jurusan').value;
            
            if(!kls || !jur) return;

            const status = document.getElementById('status-loading');
            status.style.display = 'block';
            status.innerText = "⏳ Menarik data absen dari server...";
            status.style.color = "#ff9f43";

            if (jur === "TKR") jur = "TKRO";
            const sheetName = `${kls} ${jur}`;
            const targetRange = (kls === "12") ? "B7:B" : "D2:D";
            
            const url = `https://docs.google.com/spreadsheets/d/${ID_SPREADSHEET_ABSEN}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&range=${targetRange}&cache=${new Date().getTime()}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Network response was not ok");
                const text = await res.text();
                
                let names = text.split('\n').map(row => row.replace(/"/g, '').trim());
                let cleanNames = names.filter(n => n !== "" && !n.toLowerCase().includes("nama"));

                const datalist = document.getElementById('datalist-nama');
                datalist.innerHTML = "";
                cleanNames.forEach(n => {
                    datalist.innerHTML += `<option value="${n}">`;
                });

                status.innerText = `✅ Data ${kls} ${jur.replace('TKRO','TKR')} berhasil dimuat!`;
                status.style.color = "#25D366";
                setTimeout(() => status.style.display = 'none', 3000);
            } catch (e) {
                status.innerHTML = "❌ Gagal menarik data. Pastikan ada internet.";
                status.style.color = "#ff4757";
            }
        }

        // --- MANAJEMEN KOTAK SISWA ---
        function tambahKotak() {
            simpanInput();
            dataSiswa.push({ nama: "", chips: [], lainnya: "" });
            renderKotak();
        }

        function hapusKotak(index) {
            simpanInput();
            dataSiswa.splice(index, 1);
            renderKotak();
        }

        function toggleChip(index, namaChip) {
            simpanInput();
            let arr = dataSiswa[index].chips;
            let i = arr.indexOf(namaChip);
            if(i > -1) arr.splice(i, 1);
            else arr.push(namaChip);
            renderKotak();
        }

        function simpanInput() {
            const cards = document.querySelectorAll('.card-siswa');
            cards.forEach((card, i) => {
                if (dataSiswa[i]) {
                    dataSiswa[i].nama = card.querySelector('.input-nama').value;
                    let inputLainnya = card.querySelector('.input-lainnya');
                    if(inputLainnya) dataSiswa[i].lainnya = inputLainnya.value;
                }
            });
        }

        function renderKotak() {
            const container = document.getElementById('list-pelanggar');
            container.innerHTML = "";
            
            dataSiswa.forEach((data, i) => {
                let chipsHtml = "";
                let isLainnya = data.chips.includes("Lainnya");
                
                pelanggaranList.forEach(p => {
                    const active = data.chips.includes(p) ? "active" : "";
                    chipsHtml += `<div class="chip ${active}" onclick="toggleChip(${i}, '${p}')">${p}</div>`;
                });

                container.innerHTML += `
                    <div class="card-siswa">
                        <div class="card-header">
                            <span class="card-title">${i + 1}. Nama Pelanggar</span>
                            ${i > 0 ? `<button class="btn-hapus" onclick="hapusKotak(${i})">X Hapus</button>` : ''}
                        </div>
                        <input type="text" class="input-nama" list="datalist-nama" placeholder="Ketik nama..." value="${data.nama}">
                        <div style="font-size:12px; color:#ddd; margin-top:5px;">Pelanggaran Senin:</div>
                        <div class="chip-group">${chipsHtml}</div>
                        <input type="text" class="input-lainnya" placeholder="Ketik pelanggaran lainnya..." style="display: ${isLainnya ? 'block' : 'none'};" value="${data.lainnya}">
                    </div>
                `;
            });
        }

        // --- GENERATE HASIL TEKS ---
        function generateLaporan() {
            simpanInput();
            const petugas = document.getElementById('input-petugas').value.trim();
            const kls = document.getElementById('select-kelas').value;
            const jur = document.getElementById('select-jurusan').value;

            if (!petugas) return alert("⚠️ Nama Petugas belum diisi!");
            if (!kls || !jur) return alert("⚠️ Kelas & Jurusan di atas belum dipilih!");

            let teks = `.addlaporan (${petugas})\n`;
            let valid = 0;

            dataSiswa.forEach(row => {
                if (row.nama && row.chips.length > 0) {
                    let list = [...row.chips];
                    let idxLainnya = list.indexOf("Lainnya");
                    if (idxLainnya > -1) {
                        list.splice(idxLainnya, 1);
                        if(row.lainnya) list.push(row.lainnya);
                    }
                    teks += `${row.nama} ${kls} ${jur.toLowerCase()}: ${list.join(', ')}\n`;
                    valid++;
                }
            });

            if (valid === 0) return alert("⚠️ Data masih kosong. Isi minimal 1 nama dan pelanggarannya.");

            document.getElementById('teks-hasil').value = teks;
            document.getElementById('halaman-input').style.display = 'none';
            document.getElementById('halaman-hasil').style.display = 'block';
        }

        function kembaliEdit() {
            document.getElementById('halaman-input').style.display = 'block';
            document.getElementById('halaman-hasil').style.display = 'none';
            document.getElementById('btn-copy').innerText = "📋 Salin Teks";
        }

        function salinTeks() {
            const t = document.getElementById('teks-hasil');
            t.select(); t.setSelectionRange(0, 99999);
            document.execCommand('copy');
            document.getElementById('btn-copy').innerText = "✅ Teks Tersalin!";
        }
    </script>
</body>
</html>
